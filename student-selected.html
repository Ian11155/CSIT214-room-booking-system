            display: grid;

            grid-template-columns: repeat(3, 1fr); 
            gap: 12px;

            width: 80%;
            margin-left: 40px;
            margin-top: 10px;
            box-sizing: border-box;

    <!-- JavaScript -->
    <script>
    // stored format:
    /*const roomData = {
                        id: roomTypeValue + '-' + `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,"0")}-${String(currentDate.getDate()).padStart(2,"0")}`, // Unique ID based on room type and date
                        roomType: roomTypeValue,
                        price: roomPriceValue,
                        start: `${dateStr}T${startTimeValue}`,
                        end: `${dateStr}T${endTimeValue}`,
                        date: `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,"0")}-${String(currentDate.getDate()).padStart(2,"0")}`,// Format: YYYY-MM-DD,
                        promo: roomPromoCodeValue,
                        percent: roomPromoPercentageValue,

                        promoPercent: roomPromoCodeValue + ',' + roomPromoPercentageValue,
                    };
                    let existingData = JSON.parse(localStorage.getItem('selectedRoom')) || [];
                    existingData.push(roomData);
                    localStorage.setItem('selectedRoom', JSON.stringify(existingData));
    */
    const dateInput = document.querySelector('.date-field');
    const launchedRooms = JSON.parse(localStorage.getItem('selectedRoom')) || [];
    
    const grandTotalAmount = document.getElementById('grand-total-amount');
    let calculatedTotalAmount = 0
    
    // Function to display timings once clicked on a room type radio button
    function showTimings() {
        const timingsContainer = document.getElementById('timings-container');
        timingsContainer.innerHTML = ''; // Clear previous timings
        const selectedRoomType = document.querySelector('input[name="roomType"]:checked');
        const startTime = selectedRoomType.dataset.start;
        const endTime = selectedRoomType.dataset.end;
        const startDateTime = new Date(startTime);
        const endDateTime = new Date(endTime);

        const finalizedBookings = JSON.parse(localStorage.getItem("paidBookings")) || []; // Format: "RoomName-YYYY-MM-DD-10:00 AM"
        
        const tableBody = document.getElementById("table-preview-body");
        const currentTableContent = tableBody.innerText;
 
        // Create checkbox for every hour between start and end time
        for (let time = startDateTime; time < endDateTime; time.setHours(time.getHours() + 1)) {
            const timeId = `time-${time.getTime()}`; // Unique ID for label connection

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.name = 'timing';
            checkbox.id = timeId; // Connect label to checkbox
            // Store the formatted time directly ON the element
            const formattedTime = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); //format:16:00
            checkbox.dataset.timeStr = formattedTime;
            const nextHour = new Date(time);
            nextHour.setHours(nextHour.getHours() + 1);
            const formattedNextHour = nextHour.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            // Store the ISO string for later use when booking
            checkbox.value = time.toISOString();
            // Create label for the checkbox
            const label = document.createElement('label');
            label.setAttribute('for', timeId);
            label.textContent = ` ${formattedTime} - ${formattedNextHour}`;
            // When a timing checkbox is clicked, add the booking details to the booking price list
            const roomName = selectedRoomType.value;
            
            // Check if this specific room/date/time is already booked
            const currentCombo = `${roomName}-${dateInput.value}-${formattedTime}`;

            if (finalizedBookings.includes(currentCombo)) {
                checkbox.disabled = true;
                checkbox.checked = true; // Optional: show it as already selected but locked
            }

            // --- NEW LOGIC: Auto-check if already in table ---
            const timeRange = `${formattedTime} to ${formattedNextHour}`;
            console.log(currentTableContent)
            if (currentTableContent.includes(roomName) && currentTableContent.includes(timeRange) && currentTableContent.includes(dateInput.value)) {
                const rows = Array.from(document.querySelectorAll("#table-preview-body tr"));
                const timeRange = `${formattedTime} to ${formattedNextHour}`;

                checkbox.checked = rows.some(row => 
                    row.cells[0].textContent === roomName && 
                    row.cells[1].textContent === dateInput.value && 
                    row.cells[2].textContent === timeRange
                );
            }
            label.textContent = ` ${formattedTime} - ${formattedNextHour}`;
            
            checkbox.onclick = function() {
                const selectedRoomType = document.querySelector('input[name="roomType"]:checked');
                const price = selectedRoomType.dataset.price;
                const promo = selectedRoomType.dataset.promo;
                const percent = selectedRoomType.dataset.percent;
                const capacity = selectedRoomType.dataset.capacity;

                // If unchecked, remove the corresponding booking price entry(table)
                if (this.checked === false) {
                    const tableBody = document.getElementById("table-preview-body")
                    // search the table and remove the row if all check true
                    for (let i = 0; i < tableBody.children.length; i++) {
                        if (tableBody.children[i].textContent.includes(formattedTime) && tableBody.children[i].textContent.includes(formattedNextHour) && tableBody.children[i].textContent.includes(roomName)) {
                            tableBody.children[i].remove();
                            // minus price for total amount
                            if (!percent){
                                calculatedTotalAmount -= +price
                            } else{
                                let calculatedDiscount = (+price / 100) * +percent;
                                let finalPrice = +price - calculatedDiscount;
                                calculatedTotalAmount -= finalPrice;
                            };
                            if (calculatedTotalAmount < 0) calculatedTotalAmount = 0;

                            calculatedTotalAmount = Math.round(calculatedTotalAmount * 100) / 100
                            grandTotalAmount.innerHTML = '$' + calculatedTotalAmount.toFixed(2);

                            togglePaymentButton()
                        }
                    }
                    return;
                }
                // table stuffs
                const tableRow = document.createElement("tr")
                const tableBody = document.getElementById("table-preview-body")
                tableRow.dataset.promo = promo ? promo : '-' //example output: <tr data-promo="HALF">...</tr>
                tableRow.dataset.percent = percent ? percent : '-'
                tableRow.dataset.price = price
                tableRow.className = "previewRows";
                tableRow.innerHTML = `
                    <td>${roomName}</td>
                    <td>${dateInput.value}</td>
                    <td>${formattedTime} to ${formattedNextHour}</td>
                    <td><i class="fa-solid fa-user-group"></i>&nbsp${capacity}</td>
                    <td class="row-promo-code">-</td>
                    <td class="row-amount">$${(+price).toFixed(2)}</td>
                    `
                tableBody.appendChild(tableRow);

                let Price = +price;
                calculatedTotalAmount += Price;

                calculatedTotalAmount = Math.round(calculatedTotalAmount * 100) / 100
                grandTotalAmount.innerHTML = '$' + calculatedTotalAmount.toFixed(2);

                togglePaymentButton()

            };

            
            // Append the checkbox and label to the timings container
            timingsContainer.appendChild(checkbox);
            timingsContainer.appendChild(label);
            
        }
    }
    function loadRoomsForDate(selectedDate) {
        // On page load, read the launched rooms from localStorage and create checkboxes for them
        const radioContainer = document.getElementById('roomTypeRadio');

        radioContainer.innerHTML = '';
        // 1. Create a Set to track room types we have already added, *Set automatically removes duplicates for us*
        const addedTypes = new Set();

        for (let i = 0; i < launchedRooms.length; i++) {
            const roomDate = launchedRooms[i].start.split('T')[0];
            if (roomDate === selectedDate) {
                const currentType = launchedRooms[i].roomType;
                const currentRoom = launchedRooms[i];

                // 2. Check if we have already seen this room type
                if (addedTypes.has(currentType)) {
                    continue; // Skip to the next room in the loop
                }
            
                // 3. Add this type to our "seen" list so we don't add it again
                addedTypes.add(currentType);

                // Create the wrapper label
                const wrapper = document.createElement('label');
                wrapper.className = 'room-option';

                // Create radio button for each launched room
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'roomType';
                radio.value = launchedRooms[i].roomType;
                radio.id = launchedRooms[i].roomType;
                // Store additional data as dataset attributes
                radio.dataset.start = launchedRooms[i].start;
                radio.dataset.end = launchedRooms[i].end;
                radio.dataset.price = launchedRooms[i].price;
                radio.dataset.promo = launchedRooms[i].promo;
                radio.dataset.percent = launchedRooms[i].percent;
                radio.dataset.capacity = launchedRooms[i].capacity;
                // Create inner HTML for Name, Capacity, and Price
                wrapper.innerHTML = `
                    <div class="room-name">${currentRoom.roomType}</div>
                    <div class="room-meta">
                        <span class="badge badge-capacity"><i class="fa-solid fa-user-group"></i>Up to ${currentRoom.capacity}</span>
                        <span class="badge badge-price">$${parseFloat(currentRoom.price).toFixed(2)} / hr</span>
                    </div>
                `;

                // Prepend the radio button so it appears on the left
                wrapper.prepend(radio);
                // onclick for radio button to show timings
                radio.onclick = function() {
                    if (dateInput.value) {
                        showTimings();
                    } else {
                        alert('Please select a date first to view available timings for this room type.');
                        radio.checked = false; // Uncheck the radio button since no date is selected
                    }
                };
                // Append the radio button and label to the container
                
                radioContainer.appendChild(wrapper);
                // Add a line break before each new radio button
                const br = document.createElement('br');
                radioContainer.appendChild(br);
            }
        }
    }

    // Listens for any changes to localStorage made by your Staff page.
    window.addEventListener('storage', (event) => {
        if (event.key === 'selectedRoom') {
            // When 'selectedRoom' is updated in the other tab, reload this one!
            window.location.reload();
        }
    });

    // Main booking logic (booking button and after)
    function paymentButton(){
        const tablePreviewBody = document.getElementById("table-preview-body");
        const rows = tablePreviewBody.querySelectorAll("tr");

        rows.forEach(row => {
            const promoCell = row.cells[4]; // The Promo Code cell
            let promoCode = "-";
            let promoPercent = "-";

            // Check if a promo was actually applied to this row
            if (promoCell.dataset.codePercent) {
                const data = promoCell.dataset.codePercent.split(',');
                promoCode = data[0];    // "HALF"
                promoPercent = data[1]; // "50"
            }

            const selectedSlots = {
                room: row.cells[0].textContent,
                date: row.cells[1].textContent,
                timing: row.cells[2].textContent,
                capacity: row.cells[3].textContent,
                promo: promoCode,
                percentage: `${promoPercent}%`,
                amount: row.cells[5].textContent,
            }

            let existingData = JSON.parse(localStorage.getItem('selectedSlots')) || [];
            existingData.push(selectedSlots)
            localStorage.setItem('selectedSlots', JSON.stringify(existingData));
        });

        window.location.href = "payment-page.html"
    }
    
    dateInput.onchange = function() {
        // If a room type is already selected, redraw the timings
        if (document.querySelector('input[name="roomType"]:checked')) {
            showTimings();
        }
    };

    // Promo code logic
    function applyPromo(){
        // query inside the function to ensure you have the latest rows
        const tableBody = document.getElementById("table-preview-body");
        const tablePreviewRows = tableBody.querySelectorAll('tr');

        const promoInput = document.getElementById('promo-input').value;
        const promoInputBox = document.getElementById('promo-input')

        tablePreviewRows.forEach(row => {
            const rowPromoCode = row.querySelector('.row-promo-code');
            const rowPromoPercent = row.querySelector('.row-promo-percent');
            const rowAmount = row.querySelector('.row-amount');
            console.log(row.dataset.promo) // to retrieve "HALF" from here: <tr data-promo="HALF">...</tr>
            if (promoInput === row.dataset.promo && rowPromoCode.innerHTML === '-'){
                rowPromoCode.innerHTML = `<i class="fa-regular fa-circle-check"></i>    Promo applied: ${row.dataset.percent}% OFF`;
                rowPromoCode.style.color = "#4e8a6d"
                rowPromoCode.dataset.codePercent = `${row.dataset.promo},${row.dataset.percent}`
                
                calculatedTotalAmount -= +row.dataset.price;
                let discount = (+row.dataset.price / 100) * +row.dataset.percent;
                let finalPrice = +row.dataset.price - discount;
                calculatedTotalAmount = calculatedTotalAmount + (finalPrice);

                calculatedTotalAmount = Math.round(calculatedTotalAmount * 100) / 100
                grandTotalAmount.textContent = '$' + calculatedTotalAmount.toFixed(2);
                finalPrice = Math.round(finalPrice * 100) / 100;
                rowAmount.textContent = '$' + finalPrice.toFixed(2);
                
                
                row.dataset.promo = "checked"
            }
        })
        promoInputBox.value = ""
    }

    function restoreState() {
        const savedData = JSON.parse(localStorage.getItem("newSelectedSlotsData"));
        if (!savedData || savedData.length === 0) return;

        const tableBody = document.getElementById("table-preview-body");
        
        savedData.forEach(item => {
            const tableRow = document.createElement("tr");
            tableRow.className = "previewRows"
            
            // We need to find the original price/promo from launchedRooms to keep datasets accurate
            const originalRoom = launchedRooms.find(r => r.roomType === item.room);
            
            tableRow.dataset.promo = originalRoom ? originalRoom.promo : '-';
            tableRow.dataset.percent = originalRoom ? originalRoom.percent : '-';
            tableRow.dataset.price = originalRoom ? originalRoom.price : '0';
            let updatedPromoLine = "-"; 
            let applyGreenStyle = false;

            // Clean up percentage (remove potential "undefined%" strings)
            const cleanPercentage = item.percentage ? item.percentage.replace('%', '') : "-";

            if (item.percentage && item.percentage !== "-%" && item.percentage !== "undefined%") {
                updatedPromoLine = `<i class="fa-regular fa-circle-check"></i> Promo applied: ${item.percentage} OFF`;
                applyGreenStyle = true;
            }

            // Clean up capacity (remove the "Up to" or icon text if it was accidentally saved)
            const cleanCapacity = item.capacity.replace(/[^\d]/g, '');

            tableRow.innerHTML = `
                <td>${item.room}</td>
                <td>${item.date}</td>
                <td>${item.timing}</td>
                <td><i class="fa-solid fa-user-group"></i>${item.capacity}</td>
                <td class="row-promo-code">${updatedPromoLine}</td>
                <td class="row-amount">${item.amount}</td>
            `;
            if (applyGreenStyle) {
                const rowPromoCode = tableRow.querySelector('.row-promo-code');
                rowPromoCode.style.color = "#4e8a6d";
                rowPromoCode.dataset.codePercent = `${item.promo},${cleanPercentage}`;
            }

            tableBody.appendChild(tableRow);

            // Update the global running total
            const priceNum = parseFloat(item.amount.replace('$', ''));
            calculatedTotalAmount += priceNum;
        });

        // Update the Total Display
        grandTotalAmount.innerHTML = '$' + calculatedTotalAmount.toFixed(2);

        // Set the Date input
        dateInput.value = savedData[0].date;

        // Auto-select the radio button of the first item in the list
        const firstRoomName = savedData[0].room;
        const radioToSelect = document.getElementById(firstRoomName);
        if (radioToSelect) {
            radioToSelect.checked = true;
            showTimings(); // Trigger checkboxes to show up
        }

        // Clean up so it doesn't double-load if they refresh
        localStorage.removeItem("newSelectedSlotsData");

        togglePaymentButton()
    }

    // Call it immediately
    restoreState();

    function setDateRestrictions() {
        // 1. Get all unique dates from your launchedRooms
    const availableDates = [...new Set(launchedRooms.map(room => 
        new Date(room.start).toISOString().split('T')[0]
    ))];

    // 2. Initialize Flatpickr on your .date-field
    const fp = flatpickr(".date-field", {
        dateFormat: "Y-m-d",
        defaultDate: "today",
        showMonths: 2,
        static: true,
        enable: availableDates,
        
        // forces the rooms to load the second Flatpickr boots up
        onReady: function(selectedDates, dateStr) {
            loadRoomsForDate(dateStr); 
            // Clear the timings grid on initial load
            document.getElementById('timings-container').innerHTML = '';
        },
        onChange: function(selectedDates, dateStr) {
            // Trigger the new function with the newly selected date
            loadRoomsForDate(dateStr);
            // Clear the timings grid on initial load
            document.getElementById('timings-container').innerHTML = ''; 

            // Manually trigger your timing logic when a valid date is picked
            if (document.querySelector('input[name="roomType"]:checked')) {
                showTimings();
            }
        }
    });
    }

    function togglePaymentButton() {
        const tableBody = document.getElementById("table-preview-body");
        const payBtn = document.getElementById("payment-btn");
        payBtn.disabled = tableBody.children.length === 0;
    }
    togglePaymentButton()

    // Run the function
    setDateRestrictions();
    </script>
